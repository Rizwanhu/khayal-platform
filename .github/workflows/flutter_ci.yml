name: Flutter CI

on:
  pull_request:
  push:
    # Include your team’s default branch(es); GitHub default is often main.
    branches: [main, master, mobile-app]

jobs:
  flutter-checks:
    name: format · analyze · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # `.env` is gitignored; CI uses placeholders from `.env.example`.
      # When integration tests need real Supabase, add GitHub Secrets and write `.env` here instead.
      - name: Prepare environment file for build
        run: cp .env.example .env

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Equivalent to legacy `flutter format --check`
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
